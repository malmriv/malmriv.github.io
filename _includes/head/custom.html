{% include base_path %}
<!-- custom head snippets -->

<!-- icons -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png">
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg">
<link rel="icon" type="image/png" sizes="96x96" href="{{ base_path }}/images/favicon.png">
<link rel="shortcut icon" href="/images/favicon.ico">
<link rel="mask-icon" href="{{ base_path }}/images/safari-pinned-tab.svg" color="#c4b5fd">
<link rel="manifest" href="{{ base_path }}/images/manifest.json">

<!-- theme color -->
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#c4b5fd">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#c4b5fd">
<meta name="msapplication-TileColor" content="#1a1a2e">
<meta name="msapplication-navbutton-color" content="#c4b5fd">
<meta name="apple-mobile-web-app-status-bar-style" content="#c4b5fd">

<!-- styles -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- end custom head snippets -->
